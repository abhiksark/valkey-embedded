name: ci

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint, types, docs, manifest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: pip install ruff check-manifest mypy types-psutil interrogate valkey psutil pytest
      - run: ruff check src/ tests/ examples/ tools/
      - run: ruff format --check src/ tests/ examples/ tools/
      - run: check-manifest
      - run: mypy --strict src/valkey_embedded
      - run: interrogate -c pyproject.toml src/valkey_embedded

  test:
    name: test py${{ matrix.python }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      # The compiled binary is reused across runs: build_valkey.py skips the
      # compile when the cached binary's recorded version matches. Hashing the
      # build script in the key invalidates the cache on any version bump.
      - uses: actions/cache@1bd1e32a3bdc45362d1e726936510720a7c30a57 # v4.2.0
        with:
          path: |
            src/valkey_embedded/bin
            src/valkey_embedded/package_metadata.json
          key: valkey-bin-${{ runner.os }}-${{ hashFiles('tools/build_valkey.py') }}
      - name: Install C toolchain (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y make gcc
      # `pip install .` compiles the embedded Valkey via build_py (or reuses
      # the cache), so this also exercises the source-build path sdist users
      # hit. Running pytest against the installed package guards the pytest11
      # entry-point / conftest double-registration regression.
      - name: Install (compiles embedded Valkey)
        run: pip install .[dev]
      - name: Run fast test suite (with coverage gate)
        run: pytest -m "not slow" --cov=valkey_embedded --cov-fail-under=60
        # Codecov upload can be added once the repository is public.

  packaging:
    name: packaging tests (sdist + clean-venv install)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
      - run: sudo apt-get update && sudo apt-get install -y make gcc
      - run: pip install build pytest
      # Build a wheel so the offline wheel-inspection tests have an artifact,
      # then run the full suite including the slow packaging tier.
      - run: pip wheel . --no-deps -w dist
      - run: pip install .[dev]
      - run: pytest -m "slow or packaging" tests/test_packaging.py
